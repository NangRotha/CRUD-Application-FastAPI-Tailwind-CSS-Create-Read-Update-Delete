services:
  - type: web
    name: crud-fastapi-app
    runtime: python
    repo: https://github.com/NangRotha/CRUD-Application-FastAPI-Tailwind-CSS-Create-Read-Update-Delete
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0