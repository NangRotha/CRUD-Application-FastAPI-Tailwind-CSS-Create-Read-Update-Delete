<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD App with FastAPI + Tailwind CSS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet"/>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }
        .modal {
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <!-- Header -->
        <div class="text-center mb-8 fade-in">
            <h1 class="text-4xl font-bold text-gray-800 mb-2">
                <i class="ri-database-2-line text-indigo-600"></i>
                CRUD Application
            </h1>
            <p class="text-gray-600">FastAPI + Tailwind CSS | Create, Read, Update, Delete</p>
        </div>

        <!-- Add Item Form -->
        <div class="bg-white rounded-lg shadow-lg p-6 mb-8 fade-in">
            <h2 class="text-2xl font-semibold text-gray-800 mb-4 flex items-center">
                <i class="ri-add-circle-line text-green-600 mr-2"></i>
                Add New Item
            </h2>
            <form id="addItemForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Title *</label>
                    <input type="text" id="title" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
                           placeholder="Enter item title">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Description</label>
                    <textarea id="description" rows="3"
                              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
                              placeholder="Enter item description (optional)"></textarea>
                </div>
                <div class="flex items-center">
                    <input type="checkbox" id="completed" class="mr-2 w-4 h-4 text-indigo-600">
                    <label class="text-sm text-gray-700">Mark as completed</label>
                </div>
                <button type="submit"
                        class="w-full bg-gradient-to-r from-green-500 to-green-600 text-white font-semibold py-2 px-4 rounded-lg hover:from-green-600 hover:to-green-700 transition transform hover:scale-105">
                    <i class="ri-add-line"></i> Add Item
                </button>
            </form>
        </div>

        <!-- Items List -->
        <div class="bg-white rounded-lg shadow-lg p-6 fade-in">
            <h2 class="text-2xl font-semibold text-gray-800 mb-4 flex items-center">
                <i class="ri-list-check-2 text-indigo-600 mr-2"></i>
                Items List
                <span id="itemCount" class="ml-3 text-sm bg-gray-200 text-gray-700 px-2 py-1 rounded-full"></span>
            </h2>
            <div id="itemsList" class="space-y-3">
                <!-- Items will be loaded here dynamically -->
                <div class="text-center text-gray-500 py-8">
                    <i class="ri-inbox-line text-4xl mb-2 block"></i>
                    No items yet. Add your first item above!
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50 modal">
        <div class="bg-white rounded-lg shadow-xl max-w-md w-full mx-4 p-6">
            <h3 class="text-xl font-semibold mb-4 flex items-center">
                <i class="ri-edit-line text-blue-600 mr-2"></i>
                Edit Item
            </h3>
            <form id="editForm">
                <input type="hidden" id="editId">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Title</label>
                    <input type="text" id="editTitle" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Description</label>
                    <textarea id="editDescription" rows="3"
                              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500"></textarea>
                </div>
                <div class="mb-4">
                    <input type="checkbox" id="editCompleted" class="mr-2">
                    <label class="text-sm text-gray-700">Completed</label>
                </div>
                <div class="flex space-x-2">
                    <button type="submit"
                            class="flex-1 bg-blue-600 text-white font-semibold py-2 rounded-lg hover:bg-blue-700 transition">
                        Save Changes
                    </button>
                    <button type="button" onclick="closeModal()"
                            class="flex-1 bg-gray-300 text-gray-700 font-semibold py-2 rounded-lg hover:bg-gray-400 transition">
                        Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = '/api/items/';
        let currentEditId = null;

        // Load items on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadItems();
        });

        // Add item form submission
        document.getElementById('addItemForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newItem = {
                title: document.getElementById('title').value,
                description: document.getElementById('description').value,
                completed: document.getElementById('completed').checked
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newItem)
                });

                if (response.ok) {
                    document.getElementById('addItemForm').reset();
                    loadItems();
                    showNotification('Item added successfully!', 'success');
                } else {
                    showNotification('Error adding item', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showNotification('Error adding item', 'error');
            }
        });

        // Load and display items
        async function loadItems() {
            try {
                const response = await fetch(API_URL);
                const items = await response.json();
                displayItems(items);
            } catch (error) {
                console.error('Error loading items:', error);
                showNotification('Error loading items', 'error');
            }
        }

        // Display items in the DOM
        function displayItems(items) {
            const itemsList = document.getElementById('itemsList');
            const itemCount = document.getElementById('itemCount');
            
            itemCount.textContent = `${items.length} item${items.length !== 1 ? 's' : ''}`;

            if (items.length === 0) {
                itemsList.innerHTML = `
                    <div class="text-center text-gray-500 py-8">
                        <i class="ri-inbox-line text-4xl mb-2 block"></i>
                        No items yet. Add your first item above!
                    </div>
                `;
                return;
            }

            itemsList.innerHTML = items.map(item => `
                <div class="bg-gray-50 rounded-lg p-4 hover:shadow-md transition-shadow fade-in">
                    <div class="flex items-start justify-between">
                        <div class="flex-1">
                            <div class="flex items-center mb-2">
                                <div class="flex items-center">
                                    <input type="checkbox" 
                                           ${item.completed ? 'checked' : ''} 
                                           onchange="toggleComplete(${item.id}, this.checked)"
                                           class="mr-3 w-5 h-5 text-indigo-600 rounded">
                                    <h3 class="text-lg font-semibold ${item.completed ? 'line-through text-gray-500' : 'text-gray-800'}">
                                        ${escapeHtml(item.title)}
                                    </h3>
                                </div>
                            </div>
                            ${item.description ? `<p class="text-gray-600 ml-8 mb-2">${escapeHtml(item.description)}</p>` : ''}
                            <div class="text-sm text-gray-400 ml-8">
                                Created: ${new Date(item.created_at).toLocaleString()}
                                ${item.updated_at ? ` | Updated: ${new Date(item.updated_at).toLocaleString()}` : ''}
                            </div>
                        </div>
                        <div class="flex space-x-2">
                            <button onclick="editItem(${item.id})" 
                                    class="text-blue-600 hover:text-blue-800 transition">
                                <i class="ri-edit-line text-xl"></i>
                            </button>
                            <button onclick="deleteItem(${item.id})" 
                                    class="text-red-600 hover:text-red-800 transition">
                                <i class="ri-delete-bin-line text-xl"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Toggle completion status
        async function toggleComplete(id, completed) {
            try {
                await fetch(`${API_URL}${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ completed })
                });
                loadItems();
                showNotification('Status updated!', 'success');
            } catch (error) {
                console.error('Error updating status:', error);
                showNotification('Error updating status', 'error');
            }
        }

        // Edit item
        async function editItem(id) {
            try {
                const response = await fetch(`${API_URL}${id}`);
                const item = await response.json();
                
                document.getElementById('editId').value = item.id;
                document.getElementById('editTitle').value = item.title;
                document.getElementById('editDescription').value = item.description || '';
                document.getElementById('editCompleted').checked = item.completed;
                
                document.getElementById('editModal').classList.remove('hidden');
                document.getElementById('editModal').classList.add('flex');
            } catch (error) {
                console.error('Error loading item:', error);
                showNotification('Error loading item', 'error');
            }
        }

        // Update item form submission
        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const updatedItem = {
                title: document.getElementById('editTitle').value,
                description: document.getElementById('editDescription').value,
                completed: document.getElementById('editCompleted').checked
            };
            
            const id = document.getElementById('editId').value;

            try {
                const response = await fetch(`${API_URL}${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updatedItem)
                });

                if (response.ok) {
                    closeModal();
                    loadItems();
                    showNotification('Item updated successfully!', 'success');
                } else {
                    showNotification('Error updating item', 'error');
                }
            } catch (error) {
                console.error('Error updating item:', error);
                showNotification('Error updating item', 'error');
            }
        });

        // Delete item
        async function deleteItem(id) {
            if (confirm('Are you sure you want to delete this item?')) {
                try {
                    const response = await fetch(`${API_URL}${id}`, {
                        method: 'DELETE'
                    });

                    if (response.ok) {
                        loadItems();
                        showNotification('Item deleted successfully!', 'success');
                    } else {
                        showNotification('Error deleting item', 'error');
                    }
                } catch (error) {
                    console.error('Error deleting item:', error);
                    showNotification('Error deleting item', 'error');
                }
            }
        }

        // Close modal
        function closeModal() {
            document.getElementById('editModal').classList.add('hidden');
            document.getElementById('editModal').classList.remove('flex');
        }

        // Show notification
        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.className = `fixed top-4 right-4 px-6 py-3 rounded-lg shadow-lg text-white font-semibold z-50 fade-in ${
                type === 'success' ? 'bg-green-500' : 'bg-red-500'
            }`;
            notification.innerHTML = `
                <div class="flex items-center">
                    <i class="ri-${type === 'success' ? 'checkbox-circle' : 'error-warning'}-line mr-2"></i>
                    ${message}
                </div>
            `;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Close modal when clicking outside
        document.getElementById('editModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('editModal')) {
                closeModal();
            }
        });
    </script>
</body>
</html>
